<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Adventure YAML Builder</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
  </head>
  <body>
    <header class="topbar">
      <div class="brand">Adventure YAML Builder</div>
      <div class="topbar-actions">
        <button id="add-node">Add node</button>
        <button id="delete-node">Delete node</button>
        <button id="validate">Validate</button>
        <button id="export-yaml">Export YAML</button>
        <label class="import-label">
          Import YAML
          <input id="import-yaml" type="file" accept=".yml,.yaml" />
        </label>
      </div>
    </header>

    <main class="layout">
      <section class="board-wrapper">
        <div id="board" class="board">
          <svg id="links" class="links"></svg>
        </div>
      </section>

      <aside class="panel">
        <div class="panel-section">
          <h2>Story</h2>
          <label>
            Title
            <input id="story-title" type="text" />
          </label>
          <div class="row">
            <label>
              Endurance
              <input id="stat-endurance" type="number" />
            </label>
            <label>
              Habilete
              <input id="stat-habilete" type="number" />
            </label>
            <label>
              Chance
              <input id="stat-chance" type="number" />
            </label>
          </div>
        </div>

        <div class="panel-section">
          <h2>Selected node</h2>
          <div class="ip-row">
            <label>
              IP
              <input id="node-ip" type="number" min="1" max="400" />
            </label>
            <button id="node-ip-random" type="button">Random</button>
          </div>
          <label>
            Text
            <textarea id="node-text" rows="8"></textarea>
          </label>
          <div class="choices">
            <div class="choices-header">
              <h3>Choices</h3>
              <button id="add-choice">Add choice</button>
            </div>
            <div id="choices-list"></div>
          </div>
        </div>

        <div class="panel-section">
          <h2>Validation</h2>
          <pre id="validation"></pre>
        </div>
      </aside>
    </main>

    <script src="app.js"></script>
  </body>
</html>
